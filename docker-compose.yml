version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: recon_postgres
    environment:
      POSTGRES_DB: recon
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: recon_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: recon
      DB_USER: recon
      DB_PASSWORD: recon
      PORT: 3000
      PUBLIC_DIR: /app/public
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/public:ro

volumes:
  pgdata:
